name: Tests

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

jobs:
  tests:
    name: ${{ matrix.session }} ${{ matrix.python }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      actions: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - {
              python: "3.13",
              os: "ubuntu-latest",
              session: "mypy",
              upload: false,
            }
          - {
              python: "3.12",
              os: "ubuntu-latest",
              session: "mypy",
              upload: false,
            }
          - {
              python: "3.11",
              os: "ubuntu-latest",
              session: "mypy",
              upload: false,
            }
          - {
              python: "3.10",
              os: "ubuntu-latest",
              session: "mypy",
              upload: false,
            }
          - {
              python: "3.13",
              os: "ubuntu-latest",
              session: "tests",
              upload: true,
            }
          - {
              python: "3.12",
              os: "ubuntu-latest",
              session: "tests",
              upload: true,
            }
          - {
              python: "3.11",
              os: "ubuntu-latest",
              session: "tests",
              upload: true,
            }
          - {
              python: "3.10",
              os: "ubuntu-latest",
              session: "tests",
              upload: true,
            }
          - {
              python: "3.13",
              os: "windows-latest",
              session: "tests",
              upload: true,
            }
          - {
              python: "3.12",
              os: "windows-latest",
              session: "tests",
              upload: true,
            }
          - {
              python: "3.11",
              os: "windows-latest",
              session: "tests",
              upload: true,
            }
          - {
              python: "3.13",
              os: "macos-latest",
              session: "tests",
              upload: true,
            }
          - {
              python: "3.12",
              os: "macos-latest",
              session: "tests",
              upload: true,
            }
          - {
              python: "3.11",
              os: "macos-latest",
              session: "tests",
              upload: true,
            }
          - {
              python: "3.13",
              os: "ubuntu-latest",
              session: "typeguard",
              upload: false,
            }
          - {
              python: "3.13",
              os: "ubuntu-latest",
              session: "xdoctest",
              upload: false,
            }
          - {
              python: "3.13",
              os: "ubuntu-latest",
              session: "xenon",
              upload: false,
            }
          - {
              python: "3.13",
              os: "ubuntu-latest",
              session: "docs-build",
              upload: false,
            }
    env:
      NOXSESSION: ${{ matrix.session }}
      FORCE_COLOR: "1"
      PRE_COMMIT_COLOR: "always"

    steps:
      - name: Check out the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python }}

      - name: Install Nox
        run: uv tool install nox

      - name: Run Nox
        run: nox --python=${{ matrix.python }}

      - name: Upload coverage data
        if: matrix.upload
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: coverage-data-${{ matrix.python }}-${{ matrix.os }}
          include-hidden-files: true
          path: ".coverage.*"

      - name: Upload documentation
        if: matrix.session == 'docs-build'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: docs
          path: docs/_build

  coverage:
    runs-on: ubuntu-latest
    needs: tests
    permissions:
      contents: read
      actions: read
    steps:
      - name: Check out the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - name: Install Nox
        run: uv tool install nox

      - name: Download coverage data
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: coverage-data-*
          merge-multiple: true

      - name: Combine coverage data and display human readable report
        run: nox --session=coverage

      - name: Generate coverage XML report
        run: nox --session=coverage -- xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@1af58845a975a7985b0beb0cbe6fbbb71a41dbad # v5
        with:
          files: ./coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
