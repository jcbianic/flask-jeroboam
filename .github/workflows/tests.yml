name: Tests

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  tests:
    name: ${{ matrix.session }} ${{ matrix.python }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - {python: "3.13", os: "ubuntu-latest", session: "pre-commit", upload: false}
          - {python: "3.13", os: "ubuntu-latest", session: "mypy", upload: false}
          - {python: "3.12", os: "ubuntu-latest", session: "mypy", upload: false}
          - {python: "3.11", os: "ubuntu-latest", session: "mypy", upload: false}
          - {python: "3.10", os: "ubuntu-latest", session: "mypy", upload: false}
          - {python: "3.13", os: "ubuntu-latest", session: "tests", upload: true}
          - {python: "3.12", os: "ubuntu-latest", session: "tests", upload: true}
          - {python: "3.11", os: "ubuntu-latest", session: "tests", upload: true}
          - {python: "3.10", os: "ubuntu-latest", session: "tests", upload: true}
          - {python: "3.13", os: "windows-latest", session: "tests", upload: true}
          - {python: "3.12", os: "windows-latest", session: "tests", upload: true}
          - {python: "3.11", os: "windows-latest", session: "tests", upload: true}
          - {python: "3.13", os: "macos-latest", session: "tests", upload: true}
          - {python: "3.12", os: "macos-latest", session: "tests", upload: true}
          - {python: "3.11", os: "macos-latest", session: "tests", upload: true}
          - {python: "3.13", os: "ubuntu-latest", session: "typeguard", upload: false}
          - {python: "3.13", os: "ubuntu-latest", session: "xdoctest", upload: false}
          - {python: "3.13", os: "ubuntu-latest", session: "docs-build", upload: false}
    env:
      NOXSESSION: ${{ matrix.session }}
      FORCE_COLOR: "1"
      PRE_COMMIT_COLOR: "always"

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install Nox
        run: uv tool install nox

      - name: Compute pre-commit cache key
        if: matrix.session == 'pre-commit'
        id: pre-commit-cache
        shell: python
        run: |
          import hashlib
          import sys
          import os

          python = "py{}.{}".format(*sys.version_info[:2])
          payload = sys.version.encode() + sys.executable.encode()
          digest = hashlib.sha256(payload).hexdigest()
          result = "${{ runner.os }}-{}-{}-pre-commit".format(python, digest[:8])

          if "GITHUB_OUTPUT" in os.environ:
            with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                print(f"result={result}", file=f)

      - name: Restore pre-commit cache
        uses: actions/cache@v4
        if: matrix.session == 'pre-commit'
        with:
          path: ~/.cache/pre-commit
          key: ${{ steps.pre-commit-cache.outputs.result }}-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            ${{ steps.pre-commit-cache.outputs.result }}-

      - name: Run Nox
        run: nox --python=${{ matrix.python }}

      - name: Upload coverage data
        if: matrix.upload
        uses: actions/upload-artifact@v4
        with:
          name: coverage-data-${{ matrix.python }}-${{ matrix.os }}
          include-hidden-files: true
          path: ".coverage.*"

      - name: Upload documentation
        if: matrix.session == 'docs-build'
        uses: actions/upload-artifact@v4
        with:
          name: docs
          path: docs/_build

  coverage:
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Nox
        run: uv tool install nox

      - name: Download coverage data
        uses: actions/download-artifact@v4
        with:
          pattern: coverage-data-*
          merge-multiple: true

      - name: Combine coverage data and display human readable report
        run: nox --session=coverage

      - name: Publish Code Coverage to Code Climate
        uses: paambaati/codeclimate-action@v9
        env:
          CC_TEST_REPORTER_ID: ${{secrets.CC_REPORTER_ID}}
        with:
          coverageCommand: nox --session=coverage -- xml
